name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile source
        run: python -m py_compile pdf_glyph_replace.py

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Smoke console entry point
        run: |
          python -m pip install -e .
          pdf-glyph-replace --version

      - name: Upload distributions
        uses: actions/upload-artifact@v7.0.1
        with:
          name: distributions-${{ matrix.python-version }}
          path: dist/*

  release:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Build release distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/* --repo "${GITHUB_REPOSITORY}" --clobber

name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      dogfood_manifest:
        description: "Manifest JSONL path for the non-blocking dogfood health check"
        required: false
        default: "tests/fixtures/dogfood-manifest.jsonl"

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile source
        run: python -m py_compile pdf_glyph_replace.py pdf_fixture.py pdf_inventory.py pdf_dogfood.py pdf_dogfood_summary.py

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Smoke console entry point
        run: |
          python -m pip install -e .
          pdf-glyph-replace --version
          pdf-fixture-qdf --version
          pdf-inventory --version
          pdf-dogfood --version
          pdf-dogfood-summary --version

      - name: Upload distributions
        uses: actions/upload-artifact@v7.0.1
        with:
          name: distributions-${{ matrix.python-version }}
          path: dist/*

  dogfood-health:
    name: Dogfood manifest health
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install console entry points
        run: python -m pip install -e .

      - name: Run synthetic manifest health gate
        env:
          DOGFOOD_MANIFEST: ${{ inputs.dogfood_manifest }}
        run: |
          pdf-dogfood-summary "$DOGFOOD_MANIFEST" --latest-by-policy
          set +e
          pdf-dogfood-summary "$DOGFOOD_MANIFEST" --health
          status=$?
          set -e
          echo "::notice title=Dogfood health status::pdf-dogfood-summary --health exited ${status} for ${DOGFOOD_MANIFEST}"
          exit 0

  release:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Build release distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 \
            || gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
              --title "pdf-mutation ${GITHUB_REF_NAME}" --generate-notes
          gh release upload "${GITHUB_REF_NAME}" dist/* --repo "${GITHUB_REPOSITORY}" --clobber
